name: Build and Run Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build libssl-dev libabsl-dev

    - name: Run Demo Pipeline
      run: |
        chmod +x scripts/build_and_run.sh
        ./scripts/build_and_run.sh
